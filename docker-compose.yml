services:
  # ──────────────── MySQL ────────────────
  mysql:
    image: mysql:8.0
    container_name: zqcms-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-zqcms_root_2024}
      MYSQL_DATABASE: zqcms
      MYSQL_USER: zqcms
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-zqcms_pass_2024}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-zqcms_root_2024}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - zqcms-net

  # ──────────────── API Server (Bun + Elysia) ────────────────
  server:
    build:
      context: .
      dockerfile: docker/server.Dockerfile
    container_name: zqcms-server
    restart: unless-stopped
    environment:
      API_PORT: "11003"
      DATABASE_URL: mysql://zqcms:${MYSQL_PASSWORD:-zqcms_pass_2024}@mysql:3306/zqcms
      JWT_SECRET: ${JWT_SECRET:-zqcms-jwt-secret-change-in-production}
      UPLOAD_DIR: /app/uploads
    volumes:
      - uploads_data:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - zqcms-net

  # ──────────────── Web Frontend (Next.js) ────────────────
  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    container_name: zqcms-web
    restart: unless-stopped
    environment:
      API_BASE_URL: http://server:11003/api
      NEXT_PUBLIC_SITE_URL: ${SITE_URL:-http://localhost:11001}
      NEXT_PUBLIC_API_URL: http://server:11003/api
      PORT: "11001"
    depends_on:
      - server
    networks:
      - zqcms-net

  # ──────────────── Nginx (内部路由 + Admin静态文件) ────────────────
  nginx:
    build:
      context: .
      dockerfile: docker/nginx.Dockerfile
    container_name: zqcms-nginx
    restart: unless-stopped
    ports:
      - "11001:80"
    depends_on:
      - web
      - server
    networks:
      - zqcms-net

volumes:
  mysql_data:
  uploads_data:

networks:
  zqcms-net:
    driver: bridge
